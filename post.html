<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile - SocialHub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand" href="home.html">SocialHub</a>
      <div class="ms-auto">
        <a href="home.html" class="btn btn-light me-2">Home</a>
        <button onclick="logout()" class="btn btn-outline-light">Logout</button>
      </div>
    </div>
  </nav>

  <div class="container mt-5">
    <h2>My Profile</h2>
    <div id="profileData"></div>

    <h4 class="mt-5">Change Password</h4>
    <div class="card">
      <div class="card-body">
        <input type="password" id="oldPass" class="form-control mb-2" placeholder="Old Password">
        <input type="password" id="newPass" class="form-control mb-3" placeholder="New Password">
        <button onclick="changeUserPassword()" class="btn btn-primary">Change Password</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    async function loadProfile() {
      try {
        const user = await getProfile();
        document.getElementById('profileData').innerHTML = `
          <div class="card">
            <div class="card-body">
              <h4>${user.name}</h4>
              <p><strong>Email:</strong> ${user.email}</p>
            </div>
          </div>`;
      } catch (err) {
        showError(err);
      }
    }

    async function changeUserPassword() {
      const oldPassword = document.getElementById('oldPass').value;
      const newPassword = document.getElementById('newPass').value;
      if (!oldPassword || !newPassword) return showError('Please fill both fields');

      try {
        await changePassword({ oldPassword, newPassword });
        alert('✅ Password changed successfully!');
        document.getElementById('oldPass').value = '';
        document.getElementById('newPass').value = '';
      } catch (err) {
        showError(err);
      }
    }

    window.onload = loadProfile;
  </script>
</body>
</html>
