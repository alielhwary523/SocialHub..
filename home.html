<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home - SocialHub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand" href="home.html">SocialHub</a>
      <div class="ms-auto">
        <a href="profile.html" class="btn btn-light me-2">Profile</a>
        <button onclick="logout()" class="btn btn-outline-light">Logout</button>
      </div>
    </div>
  </nav>

  <div class="container mt-4">
    <h2>All Posts</h2>
    
    <!-- Create Post -->
    <div class="card mb-4">
      <div class="card-body">
        <textarea id="postBody" class="form-control" rows="3" placeholder="Write your post..."></textarea>
        <button onclick="createPost()" class="btn btn-primary mt-2">Post</button>
      </div>
    </div>

    <div id="postsContainer" class="row"></div>
  </div>

  <script src="script.js"></script>
  <script>
    async function loadPosts() {
      try {
        const posts = await getPosts();
        const container = document.getElementById('postsContainer');
        container.innerHTML = '';
        
        posts.forEach(post => {
          const card = `
            <div class="col-md-6 mb-4">
              <div class="card">
                <div class="card-body">
                  <h5 id="postBody-${post._id}">${post.body}</h5>
                  <small class="text-muted">By ${post.user?.name || 'Unknown'}</small>
                  <div class="mt-3">
                    <a href="post.html?id=${post._id}" class="btn btn-info btn-sm">Details & Comments</a>
                    <button onclick="editPost('${post._id}')" class="btn btn-warning btn-sm">Edit</button>
                    <button onclick="deletePost('${post._id}')" class="btn btn-danger btn-sm">Delete</button>
                  </div>
                </div>
              </div>
            </div>`;
          container.innerHTML += card;
        });
      } catch (err) {
        showError(err);
      }
    }

    async function createPost() {
      try {
        const body = document.getElementById('postBody').value.trim();
        if (!body) return;
        await createNewPost({ body });
        document.getElementById('postBody').value = '';
        loadPosts();
      } catch (err) { showError(err); }
    }

    async function editPost(postId) {
      const newBody = prompt('Edit post body:', document.getElementById(`postBody-${postId}`).textContent);
      if (newBody) {
        try { await updatePost(postId, { body: newBody }); loadPosts(); }
        catch (err) { showError(err); }
      }
    }

    async function deletePost(postId) {
      if (confirm('Delete post?')) {
        try { await deletePostAPI(postId); loadPosts(); }
        catch (err) { showError(err); }
      }
    }

    window.onload = loadPosts;
  </script>
</body>
</html>
