<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile - SocialHub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand" href="home.html">SocialHub</a>
      <a href="home.html" class="btn btn-light ms-auto">Home</a>
    </div>
  </nav>

  <div class="container mt-5">
    <h2>Profile</h2>
    <div id="profileData"></div>

    <h4 class="mt-5">Change Password</h4>
    <div class="card">
      <div class="card-body">
        <input type="password" id="oldPass" class="form-control mb-2" placeholder="Old Password">
        <input type="password" id="newPass" class="form-control mb-3" placeholder="New Password">
        <button onclick="changeUserPassword()" class="btn btn-warning">Change</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    async function loadProfile() {
      const user = await getProfile();
      document.getElementById('profileData').innerHTML = `
        <div class="card">
          <div class="card-body">
            <h4>${user.name}</h4>
            <p>${user.email}</p>
          </div>
        </div>`;
    }

    async function changeUserPassword() {
      const oldPassword = document.getElementById('oldPass').value;
      const newPassword = document.getElementById('newPass').value;
      await changePassword({ oldPassword, newPassword });
      alert('Password changed successfully');
    }

    window.onload = loadProfile;
  </script>
</body>
</html>
